<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Table</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>

  <div class="container mt-5">
    <a href = "{% url "tcreate" %}" class="btn btn-success">
        Add New Teacher
    </a>

    <a href="{% url 'gcreate' %}" class="btn btn-success">
        Add New Grade
    </a>

    <h2 class="mb-4">Teacher Table</h2>

    <table class="table table-bordered table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>SN</th>
          <th>Grade </th>
          <th>Section </th>
          <th>Name</th>
          <th>Age</th>
          <th>Number</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for i in teacher %}
        <tr>
          <td>{{forloop.counter}}</td>
          <td>{{i.grade.name}}</td>
          <td>{{i.grade.created_at}}</td>
          <td>{{i.name}}</td>
          <td>{{i.age}}</td>
          <td>{{i.phone}}</td>
          <td>
            <a href = "{% url "tupdate" i.id %}" class="btn btn-success">Update</a>
            <a href = "{% url "tdelete" i.id %}" class="btn btn-danger">Delete</a>
          </td>
        </tr>

        
        {% endfor %}
        
      </tbody>
    </table>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
