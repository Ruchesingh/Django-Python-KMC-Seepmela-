<!DOCTYPE html>
<html>
<head>
    <title>Grade List</title>
    <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <a href="{% url 'gcreate' %}" class="btn btn-success mb-3">
        Add Grade
    </a>
    <a href="{% url 'tcreate' %}" class="btn btn-success mb-3">
        Add New Employee
    </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>SN</th>
                <th>Grade</th>
                <th>Section</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for g in grades %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ g.name }}</td>
                <td>{{ g.section }}</td>
                <td>
                    <a href="{% url 'gupdate' g.id %}" class="btn btn-primary">
                        Update
                    </a>

                    <a href="{% url 'gdelete' g.id %}" class="btn btn-danger">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
</body>
</html>
